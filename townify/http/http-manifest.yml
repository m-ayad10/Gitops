apiVersion: v1
kind: Namespace
metadata:
  name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http
  namespace: http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: townify-app
  template:
    metadata:
      labels:
        app: townify-app
    spec:
      containers:
        - name: townify-http-image
          image: mohammedayad10/townify-http:latest
          ports:
            - containerPort: 8080
          resources:
            request:
              cpu: "500m"
            limit:
              cpu: "1000m"
          env:
            - name: GoogleClientId
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GoogleClientId

            - name: GoogleClientSecret
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: GoogleClientSecret

            - name: EMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: EMAIL_USER

            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: EMAIL_PASSWORD

            - name: UPSTASH_REDIS_REST_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: UPSTASH_REDIS_REST_URL

            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: UPSTASH_REDIS_REST_TOKEN

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET

            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_REFRESH_SECRET

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL

            - name: CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLOUD_NAME

            - name: CLOUD_API
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLOUD_API

            - name: CLOUD_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLOUD_SECRET

            - name: ALLOWED_IMAGE_TYPES
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: ALLOWED_IMAGE_TYPES

            - name: CLIENT_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: CLIENT_URL

            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: LIVEKIT_API_KEY

            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: LIVEKIT_API_SECRET

            - name: REDIS_PUBSUB_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: REDIS_PUBSUB_URL

---
apiVersion: v1
kind: Service
metadata:
  name: http-service
  namespace: http
spec:
  selector:
    app: townify-app
  ports:
    - name: http-service
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: http-scaler
  namespace: http
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: http
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
